<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards — Footer</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"rel="stylesheet">
  </head>
  <body>
    <footer class="footer-container">
      <div class="section-container">
        <div>
          <h2 class="name">Product Cards</h2>
          <p class="description">У нас самые лучшие продукты для кожи!</p>
          <img src="./images/icon_tg.png" alt="tg" class="tg-icon">
          <img src="./images/icon_vk.png" alt="vk" class="vk-icon">
        </div>
        <div class="subscribe">
          <p class="subscribe-heading">Подпишись на наши акции:</p>
          <form class="form" id="email-form">
            <input class="input-email" type="email" placeholder="Введи email..." name="email" required>
            <div class="subscribe-line"></div>
            <button class="subscribe-butn" type="submit">Подписаться</button>
          </form>
        </div>
        <nav>
          <h3 class="text-nav">Быстрые ссылки</h3>
          <ul class="footer-nav">
            <li><a class="list" href="#">Главная</a></li>
            <li><a class="list" href="#">Магазин</a></li>
            <li><a class="list" href="#">Контакты</a></li>
          </ul>
        </nav>
        <div class="overlay" id="overlay">
          <div class="modal" id="modal">
            <button class="close-btn" id="close-modal-btn">✖️</button>
            <h2 class="modal-title">Регистрация</h2>
            <form class="modal-form">
              <input type="text" placeholder="Ваше имя">
              <input type="email" placeholder="Email">
              <button type="submit" class="subscribe-butn">Отправить</button>
            </form>
          </div>
        </div>
        <div class="copyright-container">
          <hr class="line-copyright">
          </hr>
          <p class="adress">www.product-cards.com©all right reserve</p>
          <div><button id="open-modal-btn" class="reg-button">Регистрация</button></div>
        </div>
      </div>
    </footer>
    <button id="openModal">Зарегистрироваться</button>
    <div id="overlay1" class="overlay1"></div>
    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Регистрация</h2>
        <form id="registrationForm">
          <div class="form-group">
            <label for="firstName">Имя</label>
            <input type="text" id="firstName" name="firstName" placeholder="Введите ваше имя" required>
          </div>
          <div class="form-group">
            <label for="lastName">Фамилия</label>
            <input type="text" id="lastName" name="lastName" placeholder="Введите вашу фамилию" required>
          </div>
          <div class="form-group">
            <label for="birthDate">Дата рождения</label>
            <input type="date" id="birthDate" name="birthDate" required>
          </div>
          <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" placeholder="Придумайте логин" required minlength="4">
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required minlength="6">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Повторение пароля</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Введите пароль еще раз"
              required minlength="6">
          </div>
          <button type="submit">Зарегистрироваться</button>
        </form>
        <p id="errorMessage" class="error-message"></p>
      </div>
    </div>
    <script src="/main.js"></script>
    <script src="/homework-5.js"></script>
    <script src="/homework-6.js"></script>
    <script type="module" src="/homework-7.js"></script>
    <script src="./homework-9.js" type="module"></script>
  </body>
</html>
